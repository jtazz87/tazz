<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>체성분 트래커</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+KR:wght@300;400;500&display=swap');

  :root {
    --bg: #0f0f0f;
    --bg2: #181818;
    --bg3: #222;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #f0f0f0;
    --text2: #888;
    --text3: #555;
    --green: #4ade80;
    --green-dim: rgba(74,222,128,0.12);
    --red: #f87171;
    --red-dim: rgba(248,113,113,0.12);
    --blue: #60a5fa;
    --blue-dim: rgba(96,165,250,0.12);
    --amber: #fbbf24;
    --amber-dim: rgba(251,191,36,0.1);
    --radius: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    line-height: 1.6;
    min-height: 100vh;
  }

  .app { max-width: 820px; margin: 0 auto; padding: 2rem 1.25rem 4rem; }

  .header { margin-bottom: 2rem; }
  .header h1 { font-size: 22px; font-weight: 500; letter-spacing: -0.02em; margin-bottom: 4px; }
  .header p { color: var(--text2); font-size: 13px; }

  /* tabs */
  .tabs { display: flex; gap: 4px; margin-bottom: 1.5rem; border-bottom: 1px solid var(--border); padding-bottom: 0; }
  .tab-btn { padding: 8px 16px; font-size: 13px; font-family: inherit; background: none; border: none; color: var(--text2); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all .15s; }
  .tab-btn.active { color: var(--text); border-bottom-color: var(--green); }
  .tab-btn:hover:not(.active) { color: var(--text); }
  .panel { display: none; } .panel.active { display: block; }

  /* upload zone */
  .upload-zone {
    border: 1.5px dashed var(--border2);
    border-radius: var(--radius);
    padding: 2.5rem 1.5rem;
    text-align: center;
    cursor: pointer;
    transition: all .2s;
    background: var(--bg2);
    margin-bottom: 1rem;
  }
  .upload-zone:hover, .upload-zone.drag { border-color: var(--green); background: rgba(74,222,128,0.04); }
  .upload-zone .icon { font-size: 32px; margin-bottom: .75rem; opacity: .6; }
  .upload-zone h3 { font-size: 15px; font-weight: 500; margin-bottom: .35rem; }
  .upload-zone p { color: var(--text2); font-size: 12px; }
  #fileInput { display: none; }

  .preview-wrap { display: none; margin-bottom: 1rem; }
  .preview-wrap img { max-width: 100%; border-radius: var(--radius); border: 1px solid var(--border); max-height: 320px; object-fit: contain; }

  /* extracted data form */
  .extracted-card {
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    padding: 1.25rem;
    margin-bottom: 1rem;
    display: none;
  }
  .extracted-card h4 { font-size: 13px; font-weight: 500; color: var(--text2); margin-bottom: 1rem; text-transform: uppercase; letter-spacing: .06em; }
  .field-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 1rem; }
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field label { font-size: 11px; color: var(--text2); }
  .field input, .field select {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 7px 10px;
    color: var(--text);
    font-size: 14px;
    font-family: 'DM Mono', monospace;
    outline: none;
    transition: border-color .15s;
  }
  .field input:focus, .field select:focus { border-color: var(--green); }
  .field select option { background: var(--bg3); }

  .btn { padding: 9px 20px; border-radius: 7px; border: none; font-family: inherit; font-size: 13px; cursor: pointer; font-weight: 500; transition: all .15s; }
  .btn-primary { background: var(--green); color: #0f0f0f; }
  .btn-primary:hover { background: #22c55e; }
  .btn-primary:disabled { opacity: .4; cursor: default; }
  .btn-secondary { background: var(--bg3); color: var(--text2); border: 1px solid var(--border); }
  .btn-secondary:hover { color: var(--text); border-color: var(--border2); }
  .btn-danger { background: var(--red-dim); color: var(--red); border: 1px solid rgba(248,113,113,0.2); }
  .btn-danger:hover { background: rgba(248,113,113,0.2); }

  .btn-row { display: flex; gap: 8px; align-items: center; }

  /* status */
  .status { font-size: 12px; padding: 8px 12px; border-radius: 6px; margin-bottom: .75rem; display: none; }
  .status.loading { background: var(--blue-dim); color: var(--blue); display: block; }
  .status.success { background: var(--green-dim); color: var(--green); display: block; }
  .status.error { background: var(--red-dim); color: var(--red); display: block; }

  /* stats cards */
  .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 1.5rem; }
  .stat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: .85rem 1rem; }
  .stat-card .val { font-size: 22px; font-weight: 500; font-family: 'DM Mono', monospace; line-height: 1.1; }
  .stat-card .lbl { font-size: 11px; color: var(--text2); margin-top: 3px; }
  .stat-card .chg { font-size: 12px; margin-top: 4px; font-family: 'DM Mono', monospace; }
  .pos { color: var(--green); } .neg { color: var(--red); } .neu { color: var(--text2); }

  /* chart */
  .chart-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem; margin-bottom: 1rem; }
  .chart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
  .chart-header h4 { font-size: 13px; font-weight: 500; color: var(--text2); }
  .chart-legend { display: flex; gap: 12px; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text2); }
  .legend-dot { width: 8px; height: 8px; border-radius: 2px; }
  .chart-wrap { position: relative; width: 100%; height: 220px; }

  /* toggle */
  .metric-toggle { display: flex; gap: 4px; margin-bottom: .75rem; flex-wrap: wrap; }
  .mt-btn { font-size: 11px; padding: 4px 10px; border-radius: 5px; border: 1px solid var(--border); background: none; color: var(--text2); cursor: pointer; font-family: inherit; transition: all .15s; }
  .mt-btn.active { border-color: var(--green); color: var(--green); background: var(--green-dim); }

  /* table */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 8px 10px; color: var(--text2); font-weight: 400; font-size: 11px; text-transform: uppercase; letter-spacing: .05em; border-bottom: 1px solid var(--border); }
  td { padding: 9px 10px; border-bottom: 1px solid var(--border); font-family: 'DM Mono', monospace; font-size: 13px; }
  tr:hover td { background: rgba(255,255,255,0.02); }
  .tag { font-size: 10px; padding: 2px 7px; border-radius: 4px; font-family: 'Noto Sans KR', sans-serif; }
  .tag-cut { background: var(--blue-dim); color: var(--blue); }
  .tag-bulk { background: var(--green-dim); color: var(--green); }
  .tag-inbody { background: rgba(251,191,36,0.12); color: var(--amber); }
  .tag-accuniq { background: var(--bg3); color: var(--text3); }

  .empty { text-align: center; padding: 3rem; color: var(--text2); font-size: 13px; }
  .del-btn { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 12px; padding: 2px 6px; border-radius: 4px; transition: all .15s; }
  .del-btn:hover { background: var(--red-dim); color: var(--red); }

  .phase-line { display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--text2); margin-bottom: 1rem; }
  .phase-dot { width: 8px; height: 8px; border-radius: 2px; }

  @media (max-width: 600px) {
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    .field-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>체성분 트래커</h1>
    <p>스크린샷 업로드 → AI가 자동 추출 → 누적 데이터 저장</p>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('upload',this)">측정 추가</button>
    <button class="tab-btn" onclick="switchTab('chart',this)">차트</button>
    <button class="tab-btn" onclick="switchTab('history',this)">기록</button>
  </div>

  <!-- 업로드 패널 -->
  <div class="panel active" id="panel-upload">
    <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
      <div class="icon">📷</div>
      <h3>스크린샷 업로드</h3>
      <p>InBody 앱 캡처 또는 ACCUNIQ 결과 이미지를 올려주세요</p>
    </div>
    <input type="file" id="fileInput" accept="image/*">

    <div class="preview-wrap" id="previewWrap">
      <img id="previewImg" src="" alt="preview">
    </div>

    <div class="status" id="status"></div>

    <div class="extracted-card" id="extractedCard">
      <h4>추출된 데이터 — 확인 후 저장</h4>
      <div class="field-grid">
        <div class="field">
          <label>날짜</label>
          <input type="text" id="f-date" placeholder="26.03.20">
        </div>
        <div class="field">
          <label>기기</label>
          <select id="f-device">
            <option value="InBody">InBody</option>
            <option value="ACCUNIQ">ACCUNIQ</option>
          </select>
        </div>
        <div class="field">
          <label>체중 (kg)</label>
          <input type="number" id="f-weight" step="0.1">
        </div>
        <div class="field">
          <label>근육량 (kg)</label>
          <input type="number" id="f-muscle" step="0.1">
        </div>
        <div class="field">
          <label>지방량 (kg)</label>
          <input type="number" id="f-fat" step="0.1">
        </div>
        <div class="field">
          <label>체지방률 (%)</label>
          <input type="number" id="f-fatpct" step="0.1">
        </div>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" id="saveBtn" onclick="saveRecord()">저장</button>
        <button class="btn btn-secondary" onclick="resetUpload()">취소</button>
      </div>
    </div>

    <div style="margin-top:1rem">
      <button class="btn btn-secondary" onclick="switchTab('history', document.querySelectorAll('.tab-btn')[2])">
        기록 보기 →
      </button>
    </div>
  </div>

  <!-- 차트 패널 -->
  <div class="panel" id="panel-chart">
    <div class="stats-grid" id="statsGrid"></div>

    <div class="metric-toggle" id="metricToggle">
      <button class="mt-btn active" onclick="setMetric('weight',this)">체중</button>
      <button class="mt-btn" onclick="setMetric('muscle',this)">근육량</button>
      <button class="mt-btn" onclick="setMetric('fat',this)">지방량</button>
      <button class="mt-btn" onclick="setMetric('fatpct',this)">체지방률</button>
    </div>

    <div class="chart-card">
      <div class="chart-header">
        <h4 id="chartTitle">체중 추이 — InBody 기준</h4>
        <div class="chart-legend">
          <span class="legend-item"><span class="legend-dot" style="background:#60a5fa"></span>감량기</span>
          <span class="legend-item"><span class="legend-dot" style="background:#4ade80"></span>린벌크</span>
        </div>
      </div>
      <div class="phase-line">
        <span class="phase-dot" style="background:#60a5fa"></span>감량 24.10.14~25.12.30
        <span class="phase-dot" style="background:#4ade80" style="margin-left:8px"></span>린벌크 26.01.01~
      </div>
      <div class="chart-wrap"><canvas id="mainChart"></canvas></div>
    </div>
  </div>

  <!-- 기록 패널 -->
  <div class="panel" id="panel-history">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
      <span id="recordCount" style="font-size:13px;color:var(--text2)"></span>
      <button class="btn btn-danger" onclick="clearAll()">전체 삭제</button>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>날짜</th><th>기기</th><th>체중</th><th>근육</th><th>지방</th><th>지방률</th><th>페이즈</th><th></th>
        </tr></thead>
        <tbody id="historyBody"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'body-comp-records';
let records = [];
let mainChart = null;
let curMetric = 'weight';

const METRIC_CONFIG = {
  weight: { label: '체중', unit: 'kg', key: 'weight', color: '#60a5fa', min: 55, max: 92 },
  muscle: { label: '근육량', unit: 'kg', key: 'muscle', color: '#4ade80', min: 28, max: 38 },
  fat:    { label: '지방량', unit: 'kg', key: 'fat', color: '#f87171', min: 0, max: 32 },
  fatpct: { label: '체지방률', unit: '%', key: 'fatpct', color: '#fbbf24', min: 5, max: 36 },
};

async function loadRecords() {
  try {
    const r = await window.storage.get(STORAGE_KEY);
    records = r ? JSON.parse(r.value) : [];
  } catch(e) {
    records = [];
  }
  renderAll();
}

async function saveRecords() {
  try {
    await window.storage.set(STORAGE_KEY, JSON.stringify(records));
  } catch(e) { console.error(e); }
}

function getPhase(dateStr) {
  if (!dateStr) return 'cut';
  const parts = dateStr.split('.');
  if (parts.length < 2) return 'cut';
  const year = parseInt(parts[0]);
  return year >= 26 ? 'bulk' : 'cut';
}

function renderAll() {
  renderHistory();
  renderStats();
  buildChart();
}

function renderHistory() {
  const tbody = document.getElementById('historyBody');
  const sorted = [...records].sort((a,b) => b.date.localeCompare(a.date));
  document.getElementById('recordCount').textContent = `총 ${records.length}개 기록`;

  if (!sorted.length) {
    tbody.innerHTML = `<tr><td colspan="8" class="empty">아직 데이터가 없습니다. 스크린샷을 업로드해주세요.</td></tr>`;
    return;
  }
  tbody.innerHTML = sorted.map((r, i) => {
    const phase = getPhase(r.date);
    const orig_i = records.indexOf(r);
    return `<tr>
      <td>${r.date}</td>
      <td><span class="tag ${r.device==='InBody'?'tag-inbody':'tag-accuniq'}">${r.device}</span></td>
      <td>${r.weight}</td>
      <td>${r.muscle ?? '-'}</td>
      <td>${r.fat}</td>
      <td>${r.fatpct}%</td>
      <td><span class="tag ${phase==='bulk'?'tag-bulk':'tag-cut'}">${phase==='bulk'?'린벌크':'감량'}</span></td>
      <td><button class="del-btn" onclick="deleteRecord(${orig_i})">✕</button></td>
    </tr>`;
  }).join('');
}

function renderStats() {
  const ib = records.filter(r => r.device === 'InBody').sort((a,b)=>a.date.localeCompare(b.date));
  if (!ib.length) { document.getElementById('statsGrid').innerHTML = ''; return; }
  const first = ib[0], last = ib[ib.length-1];
  const dw = (last.weight - first.weight).toFixed(1);
  const dm = last.muscle != null && first.muscle != null ? (last.muscle - first.muscle).toFixed(1) : null;
  const df = (last.fat - first.fat).toFixed(1);
  const dp = (last.fatpct - first.fatpct).toFixed(1);
  const sign = v => v > 0 ? '+' : '';
  const cls = (v, posGood) => posGood ? (v > 0 ? 'pos' : v < 0 ? 'neg' : 'neu') : (v < 0 ? 'pos' : v > 0 ? 'neg' : 'neu');

  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-card"><div class="val">${last.weight}<span style="font-size:13px;font-weight:400">kg</span></div><div class="lbl">현재 체중</div><div class="chg ${cls(dw,false)}">${sign(dw)}${dw}kg (전체)</div></div>
    <div class="stat-card"><div class="val">${last.muscle ?? '-'}<span style="font-size:13px;font-weight:400">kg</span></div><div class="lbl">현재 근육량</div><div class="chg ${dm!=null?cls(dm,true):'neu'}">${dm!=null?sign(dm)+dm+'kg':'—'}</div></div>
    <div class="stat-card"><div class="val">${last.fat}<span style="font-size:13px;font-weight:400">kg</span></div><div class="lbl">현재 지방량</div><div class="chg ${cls(df,false)}">${sign(df)}${df}kg</div></div>
    <div class="stat-card"><div class="val">${last.fatpct}<span style="font-size:13px;font-weight:400">%</span></div><div class="lbl">체지방률</div><div class="chg ${cls(dp,false)}">${sign(dp)}${dp}%p</div></div>
  `;
}

function setMetric(m, btn) {
  curMetric = m;
  document.querySelectorAll('.mt-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  buildChart();
}

function buildChart() {
  const cfg = METRIC_CONFIG[curMetric];
  document.getElementById('chartTitle').textContent = `${cfg.label} 추이 — InBody 기준`;
  const ib = records.filter(r => r.device === 'InBody').sort((a,b)=>a.date.localeCompare(b.date));

  if (mainChart) { mainChart.destroy(); mainChart = null; }
  if (!ib.length) return;

  const ctx = document.getElementById('mainChart').getContext('2d');
  const cutData = ib.map(r => getPhase(r.date) === 'cut' ? (r[cfg.key] ?? null) : null);
  const bulkData = ib.map(r => getPhase(r.date) === 'bulk' ? (r[cfg.key] ?? null) : null);

  mainChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: ib.map(r => r.date),
      datasets: [
        { label: '감량기', data: cutData, borderColor: '#60a5fa', backgroundColor: 'rgba(96,165,250,0.06)', fill: true, borderWidth: 2, pointRadius: 3, pointBackgroundColor: '#60a5fa', tension: 0.3, spanGaps: false },
        { label: '린벌크', data: bulkData, borderColor: '#4ade80', backgroundColor: 'rgba(74,222,128,0.06)', fill: true, borderWidth: 2, pointRadius: 3, pointBackgroundColor: '#4ade80', tension: 0.3, spanGaps: false },
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: { mode: 'index', intersect: false, callbacks: { label: c => `${c.dataset.label}: ${c.parsed.y != null ? c.parsed.y.toFixed(1) + cfg.unit : '-'}` } } },
      scales: {
        x: { ticks: { color: '#555', font: { size: 10 }, maxTicksLimit: 14, maxRotation: 45 }, grid: { color: 'rgba(255,255,255,0.04)' } },
        y: { min: cfg.min, max: cfg.max, ticks: { color: '#555', callback: v => v + cfg.unit }, grid: { color: 'rgba(255,255,255,0.05)' } }
      }
    }
  });
}

async function deleteRecord(i) {
  if (!confirm('이 기록을 삭제할까요?')) return;
  records.splice(i, 1);
  await saveRecords();
  renderAll();
}

async function clearAll() {
  if (!confirm('전체 기록을 삭제할까요? 되돌릴 수 없습니다.')) return;
  records = [];
  await saveRecords();
  renderAll();
}

// Upload & AI extraction
const uploadZone = document.getElementById('uploadZone');
const fileInput = document.getElementById('fileInput');

uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag'));
uploadZone.addEventListener('drop', e => { e.preventDefault(); uploadZone.classList.remove('drag'); handleFile(e.dataTransfer.files[0]); });
fileInput.addEventListener('change', e => handleFile(e.target.files[0]));

let currentBase64 = null;

function handleFile(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const dataUrl = e.target.result;
    currentBase64 = dataUrl.split(',')[1];
    document.getElementById('previewImg').src = dataUrl;
    document.getElementById('previewWrap').style.display = 'block';
    extractData();
  };
  reader.readAsDataURL(file);
}

function setStatus(type, msg) {
  const s = document.getElementById('status');
  s.className = 'status ' + type;
  s.textContent = msg;
}

async function extractData() {
  setStatus('loading', 'AI가 이미지에서 데이터를 읽는 중...');
  document.getElementById('extractedCard').style.display = 'none';

  const today = new Date();
  const yy = String(today.getFullYear()).slice(-2);
  const mm = String(today.getMonth()+1).padStart(2,'0');
  const dd = String(today.getDate()).padStart(2,'0');
  const todayStr = `${yy}.${mm}.${dd}`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 500,
        messages: [{
          role: 'user',
          content: [
            { type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: currentBase64 } },
            { type: 'text', text: `이 체성분 측정 결과 이미지에서 다음 수치를 추출해주세요. 반드시 JSON만 반환하고 다른 텍스트는 절대 포함하지 마세요.

{"date":"YY.MM.DD","device":"InBody 또는 ACCUNIQ","weight":숫자,"muscle":숫자또는null,"fat":숫자,"fatpct":숫자}

- date: 이미지에서 날짜를 찾아 YY.MM.DD 형식으로. 없으면 오늘날짜 "${todayStr}" 사용
- device: InBody 앱이면 "InBody", ACCUNIQ이면 "ACCUNIQ"
- weight: 체중(kg)
- muscle: 근육량(kg), 없으면 null
- fat: 체지방량(kg)
- fatpct: 체지방률(%)
- 숫자는 소수점 포함 가능, 단위 제외` }
          ]
        }]
      })
    });

    const data = await res.json();
    const text = data.content?.[0]?.text?.trim() ?? '';
    const clean = text.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(clean);

    document.getElementById('f-date').value = parsed.date ?? todayStr;
    document.getElementById('f-device').value = parsed.device ?? 'InBody';
    document.getElementById('f-weight').value = parsed.weight ?? '';
    document.getElementById('f-muscle').value = parsed.muscle ?? '';
    document.getElementById('f-fat').value = parsed.fat ?? '';
    document.getElementById('f-fatpct').value = parsed.fatpct ?? '';

    setStatus('success', '데이터 추출 완료 — 수치를 확인하고 저장해주세요');
    document.getElementById('extractedCard').style.display = 'block';
  } catch(e) {
    setStatus('error', '추출 실패 — 수동으로 입력해주세요');
    document.getElementById('f-date').value = todayStr;
    document.getElementById('f-device').value = 'InBody';
    document.getElementById('extractedCard').style.display = 'block';
  }
}

async function saveRecord() {
  const date = document.getElementById('f-date').value.trim();
  const device = document.getElementById('f-device').value;
  const weight = parseFloat(document.getElementById('f-weight').value);
  const muscle = parseFloat(document.getElementById('f-muscle').value) || null;
  const fat = parseFloat(document.getElementById('f-fat').value);
  const fatpct = parseFloat(document.getElementById('f-fatpct').value);

  if (!date || isNaN(weight) || isNaN(fat) || isNaN(fatpct)) {
    setStatus('error', '날짜, 체중, 지방량, 체지방률은 필수입니다');
    return;
  }

  const existing = records.findIndex(r => r.date === date && r.device === device);
  const rec = { date, device, weight, muscle, fat, fatpct };

  if (existing >= 0) {
    if (!confirm(`${date} ${device} 기록이 이미 있습니다. 덮어쓸까요?`)) return;
    records[existing] = rec;
  } else {
    records.push(rec);
  }
  records.sort((a,b) => a.date.localeCompare(b.date));
  await saveRecords();
  setStatus('success', `${date} ${device} 저장 완료`);
  renderAll();
  setTimeout(resetUpload, 1500);
}

function resetUpload() {
  document.getElementById('previewWrap').style.display = 'none';
  document.getElementById('extractedCard').style.display = 'none';
  document.getElementById('fileInput').value = '';
  document.getElementById('status').className = 'status';
  currentBase64 = null;
}

function switchTab(id, btn) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-' + id).classList.add('active');
  btn.classList.add('active');
  if (id === 'chart') buildChart();
}

loadRecords();
</script>
